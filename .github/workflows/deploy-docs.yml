name: Deploy to Lab Hub

on:
  # main 브랜치에 푸시될 때마다 실행
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Install & Build Docs
        run: |
          npm install
          npm run docs:build  # 여기서 TypeDoc 추출 + VitePress 빌드

      - name: 2. Sync to Lab Repository
        run: |
          rsync -av --delete docs/.vitepress/dist/ lab-repo/rest-domain-state-manager/